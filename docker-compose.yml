# Full-stack cloud deployment.
# Copy .env.cloud.example → .env and fill in secrets before running.
#
# Services exposed to host:
#   frontend       → http://localhost:3000
#   api-gateway    → http://localhost:8082
#   access-service → http://localhost:8086
#   scenario-service → http://localhost:3001
#   keycloak       → http://localhost:8080
#   mqtt dashboard → http://localhost:18083
#
# NEXT_PUBLIC_* vars are baked into the frontend JS bundle at build time.
# To change them, rebuild the frontend image: docker compose build frontend

name: smart-home

services:
  access-service:
    container_name: smart-home-access-service
    build:
      context: ./backend/apps/access-service
    restart: unless-stopped
    ports:
      - "${ACCESS_SERVICE_PORT:-8086}:8086"
    environment:
      ACCESS_CONTROL_DB_URL: >-
        postgresql://${ACCESS_CONTROL_DB_USERNAME:-access_control_service}:${ACCESS_CONTROL_DB_PASSWORD:-access_control_service}@postgres:5432/access_control_service
      ACCESS_CONTROL_SERVICE_PORT: 8086
      DEVICE_AUTH_VERIFICATION_URL: ${DEVICE_AUTH_VERIFICATION_URL:-http://localhost:3000/device-auth}
      ACCESS_CORS_ORIGINS: ${ACCESS_CORS_ORIGINS:-http://localhost:3000,http://localhost:8082}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  scenario-service:
    container_name: smart-home-scenario-service
    build:
      context: ./backend/apps/scenario-service
    restart: unless-stopped
    ports:
      - "${SCENARIO_SERVICE_PORT:-3001}:3001"
    environment:
      SCENARIO_DATABASE_URL: >-
        mongodb://${MONGO_USERNAME:-device_service}:${MONGO_PASSWORD:-password}@localhost:27017/scenario?authSource=admin
      SCENARIO_SERVICE_PORT: 3001
      CENTRAL_MQTT_URL: ${CENTRAL_MQTT_URL:-mqtt://mqtt-gateway:1883}
      CENTRAL_MQTT_USERNAME: ${CENTRAL_MQTT_USERNAME:-}
      CENTRAL_MQTT_PASSWORD: ${CENTRAL_MQTT_PASSWORD:-}
      SCENARIO_CORS_ORIGINS: ${SCENARIO_CORS_ORIGINS:-http://localhost:3000,http://localhost:8082}

  api-gateway:
    container_name: smart-home-api-gateway
    build:
      context: ./backend/apps/api-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8082}:8082"
    environment:
      GATEWAY_PORT: 8082
      ACCESS_SERVICE_URL: http://access-service:8086
      SCENARIO_SERVICE_URL: http://scenario-service:3001
      MQTT_BROKER_URL: ${MQTT_BROKER_URL:-ws://mqtt-gateway:8083}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://keycloak:8080/realms/smart-home}
      GATEWAY_CORS_ORIGINS: ${GATEWAY_CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      access-service:
        condition: service_healthy
      scenario-service:
        condition: service_started

  frontend:
    container_name: smart-home-frontend
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8082}
        NEXT_PUBLIC_ACCESS_API_URL: ${NEXT_PUBLIC_ACCESS_API_URL:-http://localhost:8086}
        NEXT_PUBLIC_PHYSICAL_DEVICES_API_URL: ${NEXT_PUBLIC_PHYSICAL_DEVICES_API_URL:-http://localhost:3001}
        NEXT_PUBLIC_USE_MOCKS: ${NEXT_PUBLIC_USE_MOCKS:-false}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      AUTH_KEYCLOAK_ID: ${AUTH_KEYCLOAK_ID}
      AUTH_KEYCLOAK_SECRET: ${AUTH_KEYCLOAK_SECRET}
      # Must be reachable from the user's browser for the OAuth redirect.
      AUTH_KEYCLOAK_ISSUER: ${AUTH_KEYCLOAK_ISSUER:-http://localhost:8080/realms/smart-home}
    depends_on:
      - api-gateway
