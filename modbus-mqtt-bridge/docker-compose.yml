version: "3.9"

services:

  # ── Mosquitto MQTT broker ───────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"   # MQTT
      - "9001:9001"   # WebSocket (optional)
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

  # ── Modbus → MQTT bridge ────────────────────────────────────────────────────
  modbus-bridge:
    build: .
    restart: unless-stopped
    depends_on:
      - mosquitto
    # Pass the USB-RS485 adapter into the container.
    # Adjust /dev/ttyUSB0 if your adapter appears as /dev/ttyUSB1, /dev/ttyACM0, etc.
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
    # Add the container user to the 'dialout' group so it can open the serial port.
    group_add:
      - dialout
    environment:
      SERIAL_PORT:    /dev/ttyUSB0
      BAUD_RATE:      9600        # change to 19200, 38400 etc. if needed
      MQTT_HOST:      mosquitto
      MQTT_PORT:      1883
      MQTT_CLIENT_ID: modbus-bridge
      TOPIC_COMMAND:  modbus/command
      TOPIC_RESPONSE: modbus/response
      TOPIC_STATUS:   modbus/status
      TIMEOUT_MS:     1000        # serial read timeout per transaction
      RUST_LOG:       info

volumes:
  mosquitto-data:
  mosquitto-log:
