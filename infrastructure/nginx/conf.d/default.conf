# Phase 1 — HTTP only.
# Handles ACME challenge so Let's Encrypt can validate the domain.
# To upgrade to HTTPS run: ./infrastructure/nginx/init-ssl.sh <domain> <email>
#
# Routing:
#   /            → frontend:3000
#   /api/        → api-gateway:8082   (keeps /api/ prefix, gateway handles /api/v1/*)
#   /access/     → access-service:8086 (strips /access/ prefix)
#   /scenario/   → scenario-service:3001 (strips /scenario/, supports WebSocket)
#
# NEXT_PUBLIC_* env vars when using nginx as entry point:
#   NEXT_PUBLIC_API_URL                  = http://<domain>
#   NEXT_PUBLIC_ACCESS_API_URL           = http://<domain>/access
#   NEXT_PUBLIC_PHYSICAL_DEVICES_API_URL = http://<domain>/scenario

server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge (must work in HTTP mode before cert exists)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass         http://frontend:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /api/ {
        proxy_pass         http://api-gateway:8082;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Strips /access/ before forwarding — access-service serves at /api/v1/
    location /access/ {
        proxy_pass         http://access-service:8086/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Strips /scenario/ + WebSocket upgrade for Socket.IO
    location /scenario/ {
        proxy_pass         http://scenario-service:3001/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }
}
