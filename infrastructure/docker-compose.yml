services:
  # Postgres
  postgres:
    image: postgres:18
    container_name: smart-home-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - pg_data:/var/lib/postgresql
      - ./postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - ../backend/.env

  # MongoDB
  mongodb:
    image: mongo:latest
    container_name: smart-home-mongodb
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: device_service
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: device_service
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - ../backend/.env

  redis:
    image: redis:latest
    container_name: smart-home-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  keycloak:
    build:
      context: ./keycloak
      dockerfile: Dockerfile.keycloak
    container_name: smart-home-keycloak
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      JAVA_OPTS_APPEND: >-
        -Xms128m -Xmx512m
        -XX:MaxMetaspaceSize=256m
    command:
      [
        "start-dev",
        "--import-realm",
        "--spi-theme--static-max-age=-1",
        "--spi-theme--cache-themes=false",
        "--spi-theme--cache-templates=false"
      ]
    mem_limit: 768m
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
      - ./keycloak/themes/domovoy:/opt/keycloak/themes/domovoy
    env_file:
      - ../backend/.env

  # Ollama — локальный LLM-сервер (CPU-only по умолчанию)
  # Для NVIDIA GPU: добавить deploy.resources.reservations.devices (см. комментарий ниже)
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: smart-home-ollama
  #   ports:
  #     - "${OLLAMA_PORT:-11434}:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   healthcheck:
  #     test: ["CMD-SHELL", "ollama list || exit 1"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 5
  #     start_period: 60s
  #   restart: unless-stopped
  #   env_file:
  #     - ../backend/.env
  #   # GPU (NVIDIA, только если установлен NVIDIA Container Toolkit + WSL2):
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]

  # EMQX — central MQTT broker (Community Edition 5.7.0)
  # Dashboard: http://localhost:18083  (default admin / see EMQX_DASHBOARD__DEFAULT_PASSWORD)
  # Anonymous connections are rejected; configure credentials in emqx/credentials.env
  mqtt-gateway:
    image: emqx/emqx:5.7.0
    container_name: smart-home-mqtt-gateway
    restart: unless-stopped
    ports:
      - "${MQTT_GATEWAY_TCP_PORT:-1883}:1883"          # MQTT (TCP)
      - "${MQTT_GATEWAY_TLS_PORT:-8883}:8883"          # MQTT over TLS
      - "${MQTT_GATEWAY_DASHBOARD_PORT:-18083}:18083"  # Dashboard / REST API
      - "${MQTT_GATEWAY_WS_PORT:-8083}:8083"           # MQTT over WebSocket
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
      - ./emqx/emqx.conf:/opt/emqx/etc/emqx.conf:ro
    environment:
      - EMQX_DASHBOARD__DEFAULT_PASSWORD=changeme
      # Do NOT hardcode this cookie in git for non-dev environments.
      # Override via `EMQX_NODE__COOKIE` in your shell/CI or a local env file.
      - EMQX_NODE__COOKIE=${EMQX_NODE__COOKIE:-smart-home-dev-cookie-change-me}
    healthcheck:
      test: ["CMD-SHELL", "/opt/emqx/bin/emqx ctl status | grep -q \"is started\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Скачивает модель при первом запуске (идемпотентно — при повторном запуске просто проверяет)
  # ollama-pull:
  #   image: ollama/ollama:latest
  #   container_name: smart-home-ollama-pull
  #   depends_on:
  #     ollama:
  #       condition: service_healthy
  #   environment:
  #     OLLAMA_HOST: http://ollama:11434
  #   entrypoint: ["ollama", "pull", "qwen2.5:3b"]
  #   restart: "no"

volumes:
  pg_data:
  nginx_logs:
  mongodb_data:
  redis_data:
  keycloak_data:
  ollama_data:
  emqx_data:
  emqx_log:
