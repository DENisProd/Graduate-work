version: '3.9'

services:
  # Postgres
  postgres:
    image: postgres:18
    container_name: smart-home-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - pg_data:/var/lib/postgresql
      - ./postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - ../backend/.env

  # MongoDB
  mongodb:
    image: mongo:latest
    container_name: smart-home-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: device_service
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: device_service
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - ../backend/.env

  redis:
    image: redis:latest
    container_name: smart-home-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: smart-home-keycloak
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: ["start-dev", "--import-realm"]
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json

  # Ollama — локальный LLM-сервер (CPU-only по умолчанию)
  # Для NVIDIA GPU: добавить deploy.resources.reservations.devices (см. комментарий ниже)
  ollama:
    image: ollama/ollama:latest
    container_name: smart-home-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    # GPU (NVIDIA, только если установлен NVIDIA Container Toolkit + WSL2):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # Скачивает модель при первом запуске (идемпотентно — при повторном запуске просто проверяет)
  ollama-pull:
    image: ollama/ollama:latest
    container_name: smart-home-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "qwen2.5:3b"]
    restart: "no"

volumes:
  pg_data:
  nginx_logs:
  mongodb_data:
  redis_data:
  ollama_data:
