## EMQX Community Edition — IntelliGuard smart-home platform
##
## Credentials are managed via the EMQX Dashboard or REST API after first boot.
## See infrastructure/emqx/credentials.env.example for initial account setup.
##
## Reference: https://www.emqx.io/docs/en/v5.7/configuration/configuration.html

# Reject anonymous connections — every client must authenticate.
allow_anonymous = false

# Password-based authentication backed by the built-in database.
# Passwords are stored as bcrypt hashes (never plain-text).
authentication = [
  {
    mechanism = password_based
    backend = built_in_database
    password_hash_algorithm {
      name = bcrypt
    }
  }
]

# ACL authorisation: deny anything not explicitly allowed; disconnect offenders.
# Rules are managed through the Dashboard / REST API (built_in_database).
authorization {
  no_match = deny
  deny_action = disconnect
  sources = [
    {
      type = built_in_database
    }
  ]
}

log {
  console {
    level = info
  }
}
