version: "3.9"

services:
  # ── MQTT broker ─────────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    volumes:
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
      - ./mosquitto/config:/mosquitto/config
    ports:
      - "1883:1883"

  # ── Zigbee-to-MQTT bridge ────────────────────────────────────────────────────
  zigbee2mqtt:
    image: koenkk/zigbee2mqtt
    restart: unless-stopped
    depends_on:
      - mosquitto
    volumes:
      - ./zigbee2mqtt/data:/app/data
    devices:
      - /dev/ttyACM0:/dev/ttyACM0
    ports:
      - "8090:8080"   # Zigbee2MQTT web UI — host:8090 to avoid conflict with Caddy

  # ── Modbus-MQTT bridge ───────────────────────────────────────────────────────
  modbus-bridge:
    build: ./modbus-mqtt-bridge
    restart: unless-stopped
    depends_on:
      - mosquitto
    devices:
      - ${MODBUS_DEVICE:-/dev/ttyUSB0}:/dev/ttyUSB0
    group_add:
      - dialout
    environment:
      SERIAL_PORT:    /dev/ttyUSB0
      BAUD_RATE:      ${BAUD_RATE:-9600}
      MQTT_HOST:      mosquitto
      MQTT_PORT:      1883
      MQTT_CLIENT_ID: modbus-bridge
      TOPIC_COMMAND:  modbus/command
      TOPIC_RESPONSE: modbus/response
      TOPIC_STATUS:   modbus/status
      TIMEOUT_MS:     ${MODBUS_TIMEOUT_MS:-1000}
      RUST_LOG:       ${RUST_LOG:-info}

  # ── Local backend (Rust/Axum) ─────────────────────────────────────────────────
  local-backend:
    build:
      context: ./local-backend
      args:
        # release-device (default): fast ARM build. Use "release" for max binary opt.
        CARGO_PROFILE: ${LOCAL_BACKEND_CARGO_PROFILE:-release-device}
        # Optional: BUILD_JOBS=2 for low-RAM boards — pass via:
        # docker compose build --build-arg BUILD_JOBS=2 local-backend
    container_name: local-backend
    restart: unless-stopped
    depends_on:
      - mosquitto
    volumes:
      - ./local-backend/data:/app/data
    environment:
      LOCAL_SERVER_PORT:    8080
      DATABASE_URL:         sqlite:/app/data/local.db
      # Local Mosquitto for Zigbee/Modbus ingest (not cloud gateway /api/mqtt).
      ZIGBEE_MQTT_URL:      mqtt://mosquitto:1883
      LOCAL_SERVER_SERIAL:  ${LOCAL_SERVER_SERIAL:-00:00:00:00:00:00}
      SYNC_INTERVAL_SECS:   ${SYNC_INTERVAL_SECS:-300}
      RUST_LOG:             ${RUST_LOG:-info}
      # Cloud pull (access + scenarios via api-gateway). Override for dev PC on LAN.
      ACCESS_SERVICE_URL:   ${ACCESS_SERVICE_URL:-http://host.docker.internal:8082}
      CLOUD_SYNC_API_URL:   ${CLOUD_SYNC_API_URL:-http://host.docker.internal:8082}
      SCENARIO_SERVICE_URL: ${SCENARIO_SERVICE_URL:-http://host.docker.internal:8082/api/scenario}
    expose:
      - "8080"
    ports:
      - "${LOCAL_SERVER_PORT:-8081}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Caddy (frontend SPA + reverse proxy) ────────────────────────────────────
  caddy:
    build:
      context: .
      dockerfile: caddy/Dockerfile
    restart: unless-stopped
    depends_on:
      - local-backend
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
    environment:
      ACCESS_GATEWAY_UPSTREAM: ${ACCESS_GATEWAY_UPSTREAM:-host.docker.internal:8082}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
