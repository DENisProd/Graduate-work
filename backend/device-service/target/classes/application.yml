spring:
  application:
    name: device-service

  profiles:
    active: dev

  datasource:
    url: ${DEVICE_DB_URL:jdbc:postgresql://localhost:5432/device_service}
    username: ${DEVICE_DB_USERNAME:device_service}
    password: ${DEVICE_DB_PASSWORD:device_service}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

# OpenAPI (Swagger) конфигурация
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: true

server:
  port: ${DEVICE_SERVICE_PORT:8082}


logging:
  level:
    root: INFO

